apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeshark
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/meDracula/FlatlineOps.git
    targetRevision: main
    path: apps/forensics/kubeshark
    helm:
      valueFiles:
        - values.yaml
  destination:
    namespace: kubeshark
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      enabled: false
